<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AR Hunter: Play Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: black; color: white;
            text-align: center; overflow: hidden;
        }
        /* Video Kamera Utama - BACKGROUND AR */
        #webcam {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        /* Lapisan UI di atas Kamera */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 5; box-sizing: border-box; padding: 15px;
            pointer-events: none;
        }
        .ui-element { pointer-events: auto; }

        h1 { color: #ed8936; font-size: 20px; margin: 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .stats-box {
            display: flex; justify-content: space-around;
            background: rgba(26, 32, 44, 0.85);
            padding: 8px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #4a5568;
        }

        /* SONAR RADAR BAWAH LAUT */
        .sonar-container {
            background: rgba(10, 25, 20, 0.9);
            padding: 15px; border-radius: 16px; 
            border: 2px solid #00ff66; margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
            backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center;
        }

        .sonar-screen {
            position: relative;
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 2px solid #00ff66;
            background: radial-gradient(circle, rgba(0,255,102,0.15) 0%, rgba(0,0,0,0.8) 80%);
            overflow: hidden;
            margin: 10px 0;
        }

        .sonar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, rgba(0,255,102,0.4) 0deg, transparent 90deg);
            border-radius: 50%;
            animation: sweep-rotation 4s linear infinite;
            pointer-events: none;
        }
        @keyframes sweep-rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sonar-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(0, 255, 102, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }
        .ring-1 { width: 50px; height: 50px; }
        .ring-2 { width: 100px; height: 100px; }

        .sonar-blip {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #ff3333;
            animation: blip-blink 1.5s infinite;
        }
        @keyframes blip-blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .player-blip {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px;
            background-color: #00ffbb;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ffbb;
        }

        /* ELEMEN GAMBAR MONSTER AR */
        #monster-ar {
            display: none; position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%); 
            width: 180px; height: 180px;
            object-fit: contain;
            z-index: 2; cursor: pointer;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.8));
            animation: float 1.2s ease-in-out infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-50%, -50%) translateY(0px) scale(1); }
            to { transform: translate(-50%, -50%) translateY(-20px) scale(1.05); }
        }

        /* POP-UP PERTARUNGAN */
        .battle-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 32, 44, 0.95); align-items: center; justify-content: center; z-index: 10;
        }
        .battle-box {
            background: #2d3748; padding: 25px; border-radius: 12px; width: 85%; max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #e53e3e;
        }
        input {
            width: 80%; padding: 12px; font-size: 18px; margin-bottom: 15px;
            background: #1a202c; color: white; border: 2px solid #4a5568; border-radius: 6px; text-align: center;
        }
        button {
            background: #e53e3e; color: white; border: none; padding: 12px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #c53030; }
    </style>
</head>
<body>

    <!-- Video Kamera Belakang HP -->
    <video id="webcam" autoplay playsinline></video>

    <!-- Gambar Monster AR yang Muncul -->
    <img id="monster-ar" onclick="picuPertarungan()" src="" alt="Monster AR">

    <!-- Lapisan Interface (UI) -->
    <div class="ui-layer">
        <div class="ui-element">
            <h1>👾 Math AR Hunter</h1>
            <div class="stats-box">
                <div>Pemain: <span id="nama-val" style="color: #4299e1;">...</span></div>
                <div>Poin: <span id="poin-val" style="color: #48bb78;">0</span></div>
                <div>GPS: <span id="gps-status" style="color: #cbd5e0;">Mencari...</span></div>
            </div>
        </div>

        <div class="ui-element sonar-container">
            <div style="font-weight: bold; color: #00ff66; font-size: 14px; letter-spacing: 1px;">📡 SONAR TACTICAL RADAR</div>
            
            <div class="sonar-screen" id="sonar-screen">
                <div class="sonar-sweep"></div>
                <div class="sonar-ring ring-1"></div>
                <div class="sonar-ring ring-2"></div>
                <div class="player-blip"></div>
                <div id="sonar-monsters-container"></div>
            </div>

            <p id="jarak-text" style="font-size: 20px; font-weight: bold; color: #00ff66; margin: 2px 0;">Menunggu GPS...</p>
            <p id="petunjuk-text" style="font-size: 11px; color: #a0aec0; margin: 0; text-align: center;">Sonar aktif. Titik merah menunjukkan posisi monster di sekitarmu.</p>
        </div>
    </div>

    <!-- Pop-up Soal -->
    <div class="battle-overlay" id="battle-screen">
        <div class="battle-box">
            <h2 id="battle-monster-name" style="color: #e53e3e; margin: 0 0 10px 0;">Monster</h2>
            <p id="soal-text" style="font-size: 18px; background: #1a202c; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; border-left: 5px solid #e53e3e;"></p>
            <input type="number" id="jawaban-input" placeholder="Masukkan jawaban angka..." step="any"><br>
            
            <div style="display: flex; gap: 10px; width: 87%; margin: 0 auto;">
                <button onclick="serangMonster()" style="flex: 1; padding: 12px 5px;">⚔️ SERANG</button>
                <button onclick="abaikanMonster()" style="flex: 1; background: #4a5568; padding: 12px 5px;">🏃 ABAIKAN</button>
            </div>
        </div>
    </div>

    <script>
        let centerLat = null; 
        let centerLon = null; 

        // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT-MU
        const API_URL = "https://script.google.com/macros/s/AKfycbwdyX_HvzPNCgWJ05yR5MyAVIFwwp75gDQVaSQTefK1Hxtqr8R72huDEMLyAwC3cbO4/exec"; 

        // Gambar monster bawaan jika URL di database kosong
        const DEFAULT_MONSTER_IMG = "https://cdn-icons-png.flaticon.com/512/2589/2589301.png";

        let namaSiswa = "";
        let daftarMonster = [];
        let totalPoin = 0;
        let monsterTerdekat = null;
        let videoStream = null;
        let isDataLoaded = false;

        function startUpGame() {
            while (!namaSiswa || namaSiswa.trim() === "") {
                namaSiswa = prompt("Masukkan Nama Lengkap Kamu untuk Memulai Petualangan:");
            }
            document.getElementById("nama-val").innerText = namaSiswa;

            nyalakanKameraAwal();
            mulaiTrackingGPS();
        }

        function nyalakanKameraAwal() {
            const video = document.getElementById("webcam");
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                .then(stream => { 
                    videoStream = stream; 
                    video.srcObject = stream; 
                })
                .catch(err => {
                    console.error("Gagal membuka kamera: ", err);
                    alert("Aplikasi memerlukan izin kamera belakang untuk simulasi AR!");
                });
        }

        async function muatSoalCloud() {
            try {
                let res = await fetch(API_URL);
                let databaseMonster = await res.json();
                
                daftarMonster = [];
                let refLat = centerLat;
                let refLon = centerLon;
                let keys = Object.keys(databaseMonster);

                for (let i = 0; i < keys.length; i++) {
                    let id = keys[i];
                    let finalLat, finalLon;

                    if (i === 0) {
                        finalLat = centerLat;
                        finalLon = centerLon;
                    } else {
                        const konversiLat = 111000;
                        const konversiLon = 109800;
                        
                        let sudut = Math.random() * 2 * Math.PI;
                        let jarakMeter = 5 + Math.random() * 5; 

                        let deltaLat = (jarakMeter * Math.sin(sudut)) / konversiLat;
                        let deltaLon = (jarakMeter * Math.cos(sudut)) / konversiLon;

                        finalLat = refLat + deltaLat;
                        finalLon = refLon + deltaLon;
                    }
                    
                    daftarMonster.push({
                        id: id, lat: finalLat, lon: finalLon,
                        nama: databaseMonster[id].nama,
                        gambar: databaseMonster[id].gambar || DEFAULT_MONSTER_IMG, // MENGGUNAKAN GAMBAR
                        soal: databaseMonster[id].soal,
                        jawab: databaseMonster[id].jawab,
                        kalah: false
                    });

                    refLat = finalLat;
                    refLon = finalLon;
                }
                
                isDataLoaded = true;
                document.getElementById("jarak-text").innerText = "Mencari Sinyal...";
                document.getElementById("petunjuk-text").innerText = "Sistem siap. Carilah monster di sekitarmu!";
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
                document.getElementById("jarak-text").innerText = "Koneksi Bermasalah";
            }
        }

        function mulaiTrackingGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(prosesLokasiPemain, errorGPS, { 
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 7000 
                });
            } else {
                alert("GPS Geolocation tidak didukung pada perangkat ini.");
            }
        }

        async function prosesLokasiPemain(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            
            document.getElementById("gps-status").innerText = "Aktif";
            document.getElementById("gps-status").style.color = "#48bb78";

            if (centerLat === null && centerLon === null) {
                centerLat = userLat;
                centerLon = userLon;
                document.getElementById("jarak-text").innerText = "Mengunduh Soal...";
                await muatSoalCloud();
                return; 
            }

            if (!isDataLoaded) return;

            let jarakTerkecil = Infinity;
            let targetMonster = null;
            
            const sonarContainer = document.getElementById("sonar-monsters-container");
            sonarContainer.innerHTML = "";

            const RADAR_MAX_JARAK = 30; 
            const RADAR_RADIUS_PX = 80;  

            daftarMonster.forEach(m => {
                if (!m.kalah) {
                    let d = hitungJarak(userLat, userLon, m.lat, m.lon);
                    
                    if (d < jarakTerkecil) {
                        jarakTerkecil = d;
                        targetMonster = m;
                    }

                    if (d <= RADAR_MAX_JARAK) {
                        let dLat = m.lat - userLat;
                        let dLon = m.lon - userLon;

                        const konversiLat = 111000;
                        const konversiLon = 109800;
                        let yMeter = dLat * konversiLat;
                        let xMeter = dLon * konversiLon;

                        let totalDist = Math.sqrt(xMeter * xMeter + yMeter * yMeter);

                        if (totalDist > 0) {
                            let ratio = totalDist / RADAR_MAX_JARAK;
                            let distPx = ratio * RADAR_RADIUS_PX;

                            let angle = Math.atan2(yMeter, xMeter);

                            let xPx = RADAR_RADIUS_PX + distPx * Math.cos(angle);
                            let yPx = RADAR_RADIUS_PX - distPx * Math.sin(angle);

                            let blip = document.createElement("div");
                            blip.className = "sonar-blip";
                            blip.style.left = `${xPx}px`;
                            blip.style.top = `${yPx}px`;
                            
                            blip.title = `${m.nama} (${d.toFixed(1)}m)`;
                            sonarContainer.appendChild(blip);
                        }
                    }
                }
            });

            monsterTerdekat = targetMonster;

            if (monsterTerdekat) {
                document.getElementById("jarak-text").innerText = `${jarakTerkecil.toFixed(1)} Meter`;
                
                // JIKA MENDETEKSI MONSTER (<= 6 METER) -> TAMPILKAN GAMBAR DARI DATABASE
                if (jarakTerkecil <= 6) {
                    const imgMonster = document.getElementById("monster-ar");
                    imgMonster.src = monsterTerdekat.gambar; 
                    imgMonster.style.display = "block";
                } else {
                    document.getElementById("monster-ar").style.display = "none";
                }
            } else {
                document.getElementById("jarak-text").innerText = "Area Aman!";
                document.getElementById("petunjuk-text").innerText = "Hebat! Semua monster matematika di rute ini telah ditaklukkan.";
                document.getElementById("monster-ar").style.display = "none";
            }
        }

        function picuPertarungan() {
            document.getElementById("battle-monster-name").innerText = monsterTerdekat.nama;
            document.getElementById("soal-text").innerText = monsterTerdekat.soal;
            document.getElementById("jawaban-input").value = "";
            document.getElementById("battle-screen").style.display = "flex";
        }

        function abaikanMonster() {
            document.getElementById("battle-screen").style.display = "none";
            alert("Kamu memilih untuk mengabaikan monster ini. Tetap waspada di sekitar area!");
        }

        async function serangMonster() {
            const jawabanUser = parseFloat(document.getElementById("jawaban-input").value);
            if (isNaN(jawabanUser)) return alert("Masukkan jawaban angka!");

            if (Math.abs(jawabanUser - monsterTerdekat.jawab) < 0.01) {
                alert(`💥 DAR! Serangan telak!\n${monsterTerdekat.nama} hancur. Kamu mendapatkan +100 Poin!`);
                
                monsterTerdekat.kalah = true;
                totalPoin += 100;
                document.getElementById("poin-val").innerText = totalPoin;
                document.getElementById("battle-screen").style.display = "none";
                document.getElementById("monster-ar").style.display = "none";
                
                try {
                    await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "update_skor",
                            nama: namaSiswa,
                            poin: totalPoin
                        })
                    });
                } catch (err) {
                    console.error("Gagal memperbarui skor ke server cloud:", err);
                }
                
            } else {
                alert("🛡️ Meleset! Jawabanmu salah, monster menyerang balik! Hitung kembali dengan teliti.");
            }
        }

        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180; const phi2 = lat2 * Math.PI/180;
            const dPhi = (lat2-lat1) * Math.PI/180; const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function errorGPS(err) { 
            console.warn(`GPS Error (${err.code}): ${err.message}`);
            document.getElementById("gps-status").innerText = "Mati";
            document.getElementById("gps-status").style.color = "#e53e3e";
            document.getElementById("jarak-text").innerText = "GPS Terkunci";
            document.getElementById("petunjuk-text").innerText = "Aktifkan GPS HP dan berikan izin lokasi tingkat tinggi pada browser.";
        }

        window.onload = startUpGame;
    </script>
</body>
</html>
