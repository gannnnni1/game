<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AR Hunter: Play Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: black; color: white;
            text-align: center; overflow: hidden;
        }
        /* Video Kamera Utama - SELALU AKTIF SEBAGAI BACKGROUND AR */
        #webcam {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        /* Lapisan UI di atas Kamera */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 5; box-sizing: border-box; padding: 15px;
            pointer-events: none; /* Klik bisa tembus ke monster di background */
        }
        .ui-element { pointer-events: auto; } /* Aktifkan klik kembali untuk elemen UI */

        h1 { color: #ed8936; font-size: 20px; margin: 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .stats-box {
            display: flex; justify-content: space-around;
            background: rgba(26, 32, 44, 0.85);
            padding: 8px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #4a5568;
        }

        /* RADAR HUD TRANSPARAN DI ATAS KAMERA */
        .radar-box {
            background: rgba(26, 32, 44, 0.85);
            padding: 15px; border-radius: 12px; 
            border: 2px solid #4299e1; margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            transition: border-color 0.3s ease;
        }
        
        .radar-ping {
            font-size: 35px; display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Monster Mengambang Nyata di Tengah Kamera */
        #monster-ar {
            display: none; position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%); font-size: 100px;
            z-index: 2; cursor: pointer;
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.7));
            animation: float 1s ease-in-out infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-50%, -50%) translateY(0px); }
            to { transform: translate(-50%, -50%) translateY(-20px); }
        }

        /* Pop-up Mode Pertarungan Soal */
        .battle-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 32, 44, 0.95); align-items: center; justify-content: center; z-index: 10;
        }
        .battle-box {
            background: #2d3748; padding: 25px; border-radius: 12px; width: 85%; max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #e53e3e;
        }
        input {
            width: 80%; padding: 12px; font-size: 18px; margin-bottom: 15px;
            background: #1a202c; color: white; border: 2px solid #4a5568; border-radius: 6px; text-align: center;
        }
        button {
            background: #e53e3e; color: white; border: none; padding: 12px;
            font-size: 16px; font-weight: bold; border-radius: 6px; width: 87%; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #c53030; }
    </style>
</head>
<body>

    <!-- Kamera Belakang HP (Selalu Menyala Sejak Awal) -->
    <video id="webcam" autoplay playsinline></video>

    <!-- Monster Emoji yang Akan Muncul di Layar Kamera -->
    <div id="monster-ar" onclick="picuPertarungan()">👾</div>

    <!-- Lapisan Interface (UI) -->
    <div class="ui-layer">
        <!-- Bagian Atas: Info Nama, Skor & Sinyal GPS -->
        <div class="ui-element">
            <h1>👾 Math AR Hunter</h1>
            <div class="stats-box">
                <div>Pemain: <span id="nama-val" style="color: #4299e1;">...</span></div>
                <div>Poin: <span id="poin-val" style="color: #48bb78;">0</span></div>
                <div>GPS: <span id="gps-status" style="color: #cbd5e0;">Mencari...</span></div>
            </div>
        </div>

        <!-- Bagian Bawah: Radar Pelacak Transparan -->
        <div class="ui-element radar-box" id="radar-area">
            <div class="radar-ping">📡</div>
            <div style="font-weight: bold; color: #4299e1; margin-top: 5px;">RADAR DETEKSI MONSTER</div>
            <p id="jarak-text" style="font-size: 26px; font-weight: bold; color: #ed8936; margin: 5px 0;">Menunggu GPS...</p>
            <p id="petunjuk-text" style="font-size: 12px; color: #a0aec0; margin: 0;">Izinkan akses lokasi. Sistem sedang mengunci titik awal permainan.</p>
        </div>
    </div>

    <!-- Pop-up Soal Matematika -->
    <div class="battle-overlay" id="battle-screen">
        <div class="battle-box">
            <h2 id="battle-monster-name" style="color: #e53e3e; margin: 0 0 10px 0;">Monster</h2>
            <p id="soal-text" style="font-size: 18px; background: #1a202c; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; border-left: 5px solid #e53e3e;"></p>
            <input type="number" id="jawaban-input" placeholder="Masukkan jawaban angka..." step="any"><br>
            <button onclick="serangMonster()">SERANG MONSTER</button>
        </div>
    </div>

    <script>
        // --- 1. KOORDINAT TITIK PUSAT DINAMIS (IKUT POSISI HP) ---
        let centerLat = null; 
        let centerLon = null; 

        // --- 2. URL GOOGLE APPS SCRIPT (DATABASE CLOUD) ---
        // PENTING: Ganti dengan URL Web App Apps Script terbarumu!
        const API_URL = "https://script.google.com/macros/s/AKfycbzazAJICkhpWzAUwZrlF3-l6bCXAxcS5OSvoZF0RxBK5lv3E7vzc-W-z-fooUk7Eh8g/exec"; 

        // --- 3. VARIABEL GLOBAL GAME ---
        let namaSiswa = "";
        let daftarMonster = [];
        let totalPoin = 0;
        let monsterTerdekat = null;
        let videoStream = null;
        let isDataLoaded = false;

        // --- 4. START UP GAME ---
        function startUpGame() {
            // A. Minta input nama siswa di awal, kunci agar tidak bisa kosong
            while (!namaSiswa || namaSiswa.trim() === "") {
                namaSiswa = prompt("Masukkan Nama Lengkap Kamu untuk Memulai Petualangan:");
            }
            document.getElementById("nama-val").innerText = namaSiswa;

            // B. Nyalakan kamera belakang langsung sebagai background
            nyalakanKameraAwal();
            
            // C. Jalankan pemantauan GPS untuk mengunci lokasi saat ini
            mulaiTrackingGPS();
        }

        function nyalakanKameraAwal() {
            const video = document.getElementById("webcam");
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                .then(stream => { 
                    videoStream = stream; 
                    video.srcObject = stream; 
                })
                .catch(err => {
                    console.error("Gagal membuka kamera: ", err);
                    alert("Aplikasi memerlukan izin kamera belakang untuk simulasi dunia AR!");
                });
        }

        // --- 5. AMBIL DATA DARI CLOUD (PERBAIKAN TYPO S) ---
        async function muatSoalCloud() {
            try {
                let res = await fetch(API_URL);
                let databaseMonster = await res.json();
                
                daftarMonster = [];
                let refLat = centerLat;
                let refLon = centerLon;
                let keys = Object.keys(databaseMonster);

                for (let i = 0; i < keys.length; i++) {
                    let id = keys[i];
                    let finalLat, finalLon;

                    if (i === 0) {
                        finalLat = centerLat;
                        finalLon = centerLon;
                    } else {
                        const konversiLat = 111000;
                        const konversiLon = 109800; // Pastikan ini tanpa huruf s tambahan
                        
                        let sudut = Math.random() * 2 * Math.PI;
                        let jarakMeter = 5 + Math.random() * 5; 

                        let deltaLat = (jarakMeter * Math.sin(sudut)) / konversiLat;
                        let deltaLon = (jarakMeter * Math.cos(sudut)) / konversiLon; // DIBERSIHKAN DISINI

                        finalLat = refLat + deltaLat;
                        finalLon = refLon + deltaLon;
                    }
                    
                    daftarMonster.push({
                        id: id, lat: finalLat, lon: finalLon,
                        nama: databaseMonster[id].nama,
                        emoji: databaseMonster[id].emoji || "👾",
                        soal: databaseMonster[id].soal,
                        jawab: databaseMonster[id].jawab,
                        kalah: false
                    });

                    refLat = finalLat;
                    refLon = finalLon;
                }
                
                isDataLoaded = true;
                document.getElementById("jarak-text").innerText = "Mencari Sinyal...";
                document.getElementById("petunjuk-text").innerText = "Sistem siap. Carilah monster di sekitarmu!";
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
                document.getElementById("jarak-text").innerText = "Koneksi Bermasalah";
            }
        }

        // --- 6. RUNTIME RADAR DETEKSI (GPS SISWA) ---
        function mulaiTrackingGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(prosesLokasiPemain, errorGPS, { 
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 7000 
                });
            } else {
                alert("GPS Geolocation tidak didukung pada perangkat ini.");
            }
        }

        async function prosesLokasiPemain(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;
            
            document.getElementById("gps-status").innerText = "Aktif";
            document.getElementById("gps-status").style.color = "#48bb78";

            // KUNCI TITIK AWAL: Saat GPS HP pertama kali didapatkan di lapangan
            if (centerLat === null && centerLon === null) {
                centerLat = userLat;
                centerLon = userLon;
                document.getElementById("jarak-text").innerText = "Mengunduh Soal...";
                await muatSoalCloud();
                return; 
            }

            if (!isDataLoaded) return;

            let jarakTerkecil = Infinity;
            let targetMonster = null;

            daftarMonster.forEach(m => {
                if (!m.kalah) {
                    let d = hitungJarak(userLat, userLon, m.lat, m.lon);
                    if (d < jarakTerkecil) {
                        jarakTerkecil = d;
                        targetMonster = m;
                    }
                }
            });

            monsterTerdekat = targetMonster;

            if (monsterTerdekat) {
                document.getElementById("jarak-text").innerText = `${jarakTerkecil.toFixed(1)} Meter`;
                
                // JIKA RADIUS DEKAT (<= 6 meter) -> POP UP MONSTER DI TENGAH KAMERA
                if (jarakTerkecil <= 6) {
                    document.getElementById("monster-ar").innerText = monsterTerdekat.emoji;
                    document.getElementById("monster-ar").style.display = "block";
                    document.getElementById("radar-area").style.borderColor = "#e53e3e"; // Radar merah (Bahaya/Dekat)
                } else {
                    document.getElementById("monster-ar").style.display = "none";
                    document.getElementById("radar-area").style.borderColor = "#4299e1"; // Radar biru (Normal/Mencari)
                }
            } else {
                document.getElementById("jarak-text").innerText = "Area Aman!";
                document.getElementById("petunjuk-text").innerText = "Hebat! Semua monster matematika di rute ini telah ditaklukkan.";
                document.getElementById("monster-ar").style.display = "none";
            }
        }

        // --- 7. MEKANISME BATTLE & UPDATE LEADERBOARD ---
        function picuPertarungan() {
            document.getElementById("battle-monster-name").innerText = monsterTerdekat.nama;
            document.getElementById("soal-text").innerText = monsterTerdekat.soal;
            document.getElementById("jawaban-input").value = "";
            document.getElementById("battle-screen").style.display = "flex";
        }

        async function serangMonster() {
            const jawabanUser = parseFloat(document.getElementById("jawaban-input").value);
            if (isNaN(jawabanUser)) return alert("Masukkan jawaban angka!");

            // Validasi dengan sedikit toleransi pecahan/koma
            if (Math.abs(jawabanUser - monsterTerdekat.jawab) < 0.01) {
                alert(`💥 DAR! Serangan telak!\n${monsterTerdekat.nama} hancur. Kamu mendapatkan +100 Poin!`);
                
                monsterTerdekat.kalah = true;
                totalPoin += 100;
                document.getElementById("poin-val").innerText = totalPoin;
                document.getElementById("battle-screen").style.display = "none";
                document.getElementById("monster-ar").style.display = "none";
                
                // OTOMATIS KIRIM SKOR UPDATE KE GOOGLE SHEETS CLOUD
                try {
                    await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            action: "update_skor",
                            nama: namaSiswa,
                            poin: totalPoin
                        })
                    });
                } catch (err) {
                    console.error("Gagal memperbarui skor ke server cloud:", err);
                }
                
            } else {
                alert("🛡️ Meleset! Jawabanmu salah, monster menyerang balik! Hitung kembali dengan teliti.");
            }
        }

        // Formula Rumus Haversine untuk kalkulasi Jarak Meter Presisi
        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180; const phi2 = lat2 * Math.PI/180;
            const dPhi = (lat2-lat1) * Math.PI/180; const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function errorGPS(err) { 
            console.warn(`GPS Error (${err.code}): ${err.message}`);
            document.getElementById("gps-status").innerText = "Mati";
            document.getElementById("gps-status").style.color = "#e53e3e";
            document.getElementById("jarak-text").innerText = "GPS Terkunci";
            document.getElementById("petunjuk-text").innerText = "Aktifkan GPS HP dan berikan izin lokasi tingkat tinggi pada browser.";
        }

        // Booting awal otomatis saat window termuat
        window.onload = startUpGame;
    </script>
</body>
</html>
