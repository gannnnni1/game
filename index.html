<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AR Target Hunter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: black; color: white;
            text-align: center; overflow: hidden;
        }
        #webcam {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 5; box-sizing: border-box; padding: 15px; pointer-events: none;
        }
        .ui-element { pointer-events: auto; }

        h1 { color: #ed8936; font-size: 20px; margin: 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .stats-box {
            display: flex; justify-content: space-around;
            background: rgba(26, 32, 44, 0.85);
            padding: 8px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #4a5568;
        }

        /* RADAR SONAR DENGAN SOROTAN KERUCUT 60 DERAJAT */
        .sonar-container {
            background: rgba(10, 25, 20, 0.9);
            padding: 12px; border-radius: 16px; 
            border: 2px solid #00ff66; margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center;
        }

        .sonar-screen {
            position: relative; width: 160px; height: 160px;
            border-radius: 50%; border: 2px solid #00ff66;
            background: radial-gradient(circle, rgba(0,255,102,0.15) 0%, rgba(0,0,0,0.8) 80%);
            overflow: hidden; margin: 8px 0;
        }

        .camera-cone {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from -30deg at 50% 50%, rgba(0, 255, 255, 0.35) 0deg, rgba(0, 255, 255, 0.35) 60deg, transparent 60deg);
            pointer-events: none; z-index: 2;
        }

        .sonar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, rgba(0,255,102,0.3) 0deg, transparent 90deg);
            border-radius: 50%; animation: sweep-rotation 4s linear infinite; pointer-events: none;
        }
        @keyframes sweep-rotation {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }

        .sonar-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px dashed rgba(0, 255, 102, 0.3); border-radius: 50%; pointer-events: none;
        }
        .ring-1 { width: 50px; height: 50px; }
        .ring-2 { width: 100px; height: 100px; }

        .sonar-blip {
            position: absolute; width: 12px; height: 12px;
            background-color: #ff3333; border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 10px #ff3333; z-index: 3;
            animation: blip-blink 1.2s infinite;
        }
        @keyframes blip-blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .player-blip {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            background-color: #00ffbb; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ffbb; z-index: 4;
        }

        #monster-ar {
            display: none; position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%); width: 180px; height: 180px; object-fit: contain;
            z-index: 2; cursor: pointer; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.8));
            animation: float 1.2s ease-in-out infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-50%, -50%) translateY(0px) scale(1); }
            to { transform: translate(-50%, -50%) translateY(-20px) scale(1.05); }
        }

        .battle-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 32, 44, 0.95); align-items: center; justify-content: center; z-index: 10;
        }
        .battle-box {
            background: #2d3748; padding: 20px; border-radius: 12px; width: 85%; max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid #e53e3e;
            max-height: 90vh; overflow-y: auto;
        }
        
        #soal-image {
            width: 100%; max-height: 200px; object-fit: contain;
            border-radius: 8px; margin-bottom: 12px; border: 1px solid #4a5568; display: none;
        }

        input {
            width: 80%; padding: 12px; font-size: 18px; margin-bottom: 15px;
            background: #1a202c; color: white; border: 2px solid #4a5568; border-radius: 6px; text-align: center;
        }
        button {
            background: #e53e3e; color: white; border: none; padding: 12px;
            font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #c53030; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <img id="monster-ar" onclick="picuPertarungan()" src="" alt="Monster AR">

    <div class="ui-layer">
        <div class="ui-element">
            <h1>🎯 Math Hunter</h1>
            <div class="stats-box">
                <div>Pemain: <span id="nama-val" style="color: #4299e1;">...</span></div>
                <div>Poin: <span id="poin-val" style="color: #48bb78;">0</span></div>
                <div>Target: <span id="target-count" style="color: #ed8936;">0/0</span></div>
            </div>
        </div>

        <div class="ui-element sonar-container">
            <div style="font-weight: bold; color: #00ff66; font-size: 13px; letter-spacing: 1px;">📡 SCANNER </div>
            
            <div class="sonar-screen" id="sonar-screen">
                <div class="camera-cone" id="camera-cone"></div>
                <div class="sonar-sweep"></div>
                <div class="sonar-ring ring-1"></div>
                <div class="sonar-ring ring-2"></div>
                <div class="player-blip"></div>
                <div id="sonar-monsters-container"></div>
            </div>

            <p id="jarak-text" style="font-size: 18px; font-weight: bold; color: #00ff66; margin: 2px 0;">Menunggu GPS & Kompas...</p>
            <p id="petunjuk-text" style="font-size: 11px; color: #a0aec0; margin: 0; text-align: center;">Arahkan HP ke titik merah hingga masuk dalam sorotan kerucut cyan!</p>
        </div>
    </div>

    <!-- POP-UP PERTARUNGAN -->
    <div class="battle-overlay" id="battle-screen">
        <div class="battle-box">
            <h2 id="battle-monster-name" style="color: #e53e3e; margin: 0 0 10px 0;">Monster</h2>
            <p id="soal-text" style="font-size: 16px; background: #1a202c; padding: 12px; border-radius: 8px; font-weight: bold; text-align: left; border-left: 5px solid #e53e3e; margin-bottom: 10px;"></p>
            
            <!-- GAMBAR LAMPIRAN SOAL DARI SPREADSHEET (KOLOM E) -->
            <img id="soal-image" src="" alt="Gambar Soal">

            <input type="number" id="jawaban-input" placeholder="Masukkan jawaban angka..." step="any"><br>
            
            <div style="display: flex; gap: 10px; width: 87%; margin: 0 auto;">
                <button onclick="serangMonster()" style="flex: 1; padding: 12px 5px;">⚔️ SERANG</button>
                <button onclick="abaikanMonster()" style="flex: 1; background: #4a5568; padding: 12px 5px;">🏃 ABAIKAN</button>
            </div>
        </div>
    </div>

    <script>
        let centerLat = null, centerLon = null;

        // MASUKKAN URL APPS SCRIPT BERSIH MILIKMU DI SINI
        const API_URL = "https://script.google.com/macros/s/AKfycbwv4xFqOaxWwI1YWqXQazS_PsIqbGA0bcmiJTHoChxzO7SuzMBbGPoFABbqwrhSf60CIw/exec"; 
        const DEFAULT_MONSTER_IMG = "https://cdn-icons-png.flaticon.com/512/2589/2589301.png";

        let namaSiswa = "";
        let antreanMonster = [], activeMonster = null;
        let totalPoin = 0, totalTargetSelesai = 0, totalMonsterAwal = 0;
        let deviceHeading = 0;
        let isDataLoaded = false;

        function startUpGame() {
            while (!namaSiswa || namaSiswa.trim() === "") {
                namaSiswa = prompt("Masukkan Nama Lengkap Kamu untuk Memulai Petualangan:");
            }
            document.getElementById("nama-val").innerText = namaSiswa;

            nyalakanKameraAwal();
            aktifkanKompasHP();
            mulaiTrackingGPS();
        }

        function nyalakanKameraAwal() {
            const video = document.getElementById("webcam");
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
                .then(stream => { video.srcObject = stream; })
                .catch(err => { alert("Izin kamera diperlukan!"); });
        }

        function aktifkanKompasHP() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', function(e) {
                    if (e.webkitCompassHeading) deviceHeading = e.webkitCompassHeading;
                    else if (e.alpha) deviceHeading = 360 - e.alpha;
                }, true);
            }
        }

        async function muatSoalCloud() {
            try {
                let res = await fetch(API_URL);
                let databaseMonster = await res.json();
                
                let rawKeys = Object.keys(databaseMonster);
                if (rawKeys.length === 0) return;

                let firstKey = rawKeys[0];
                let restKeys = rawKeys.slice(1);

                // Acak sisa monster (Urutan acak untuk tiap siswa)
                for (let i = restKeys.length - 1; i > 0; i--) {
                    let j = Math.floor(Math.random() * (i + 1));
                    [restKeys[i], restKeys[j]] = [restKeys[j], restKeys[i]];
                }

                let finalKeys = [firstKey, ...restKeys];
                totalMonsterAwal = finalKeys.length;

                antreanMonster = [];
                let refLat = centerLat, refLon = centerLon;

                for (let i = 0; i < finalKeys.length; i++) {
                    let id = finalKeys[i];
                    let finalLat, finalLon;

                    if (i === 0) {
                        finalLat = centerLat; finalLon = centerLon; // 0 meter dari tempat berdiri
                    } else {
                        const konversiLat = 111000, konversiLon = 109800;
                        let sudut = Math.random() * 2 * Math.PI;
                        let jarakMeter = 5 + Math.random() * 5; // Spasi berantai 5-10m

                        finalLat = refLat + ((jarakMeter * Math.sin(sudut)) / konversiLat);
                        finalLon = refLon + ((jarakMeter * Math.cos(sudut)) / konversiLon);
                    }

                    antreanMonster.push({
                        id: id, lat: finalLat, lon: finalLon,
                        nama: databaseMonster[id].nama,
                        gambar: databaseMonster[id].gambar || DEFAULT_MONSTER_IMG,
                        soal: databaseMonster[id].soal,
                        gambarSoal: databaseMonster[id].gambarSoal || "",
                        jawab: databaseMonster[id].jawab
                    });

                    refLat = finalLat; refLon = finalLon;
                }

                munculkanMonsterBerikutnya();
                isDataLoaded = true;
            } catch (err) {
                console.error("Gagal sinkronisasi:", err);
                document.getElementById("jarak-text").innerText = "Koneksi Bermasalah";
            }
        }

        function munculkanMonsterBerikutnya() {
            if (antreanMonster.length > 0) {
                activeMonster = antreanMonster.shift();
            } else {
                activeMonster = null;
            }
            document.getElementById("target-count").innerText = `${totalTargetSelesai}/${totalMonsterAwal}`;
        }

        function mulaiTrackingGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(prosesLokasiPemain, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 7000 });
            } else { alert("GPS tidak didukung!"); }
        }

        async function prosesLokasiPemain(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            if (centerLat === null && centerLon === null) {
                centerLat = userLat; centerLon = userLon;
                document.getElementById("jarak-text").innerText = "Mengunduh Soal...";
                await muatSoalCloud(); return; 
            }

            if (!isDataLoaded) return;

            const sonarContainer = document.getElementById("sonar-monsters-container");
            sonarContainer.innerHTML = "";

            if (!activeMonster) {
                document.getElementById("jarak-text").innerText = "SEMUA TARGET DITAKLUKKAN!";
                document.getElementById("petunjuk-text").innerText = "Luar biasa! Seluruh monster matematika telah dikalahkan.";
                document.getElementById("monster-ar").style.display = "none";
                return;
            }

            const RADAR_MAX_JARAK = 30, RADAR_RADIUS_PX = 80; 

            let d = hitungJarak(userLat, userLon, activeMonster.lat, activeMonster.lon);
            document.getElementById("jarak-text").innerText = `${d.toFixed(1)} Meter`;

            let dLat = activeMonster.lat - userLat;
            let dLon = activeMonster.lon - userLon;
            let yMeter = dLat * 111000, xMeter = dLon * 109800;

            let monsterBearing = (Math.atan2(xMeter, yMeter) * 180 / Math.PI + 360) % 360;

            let totalDist = Math.sqrt(xMeter * xMeter + yMeter * yMeter);
            if (totalDist <= RADAR_MAX_JARAK) {
                let ratio = totalDist / RADAR_MAX_JARAK;
                let distPx = ratio * RADAR_RADIUS_PX;

                let radarAngleRad = (monsterBearing - deviceHeading - 90) * Math.PI / 180;
                let xPx = RADAR_RADIUS_PX + distPx * Math.cos(radarAngleRad);
                let yPx = RADAR_RADIUS_PX - distPx * Math.sin(radarAngleRad);

                let blip = document.createElement("div");
                blip.className = "sonar-blip";
                blip.style.left = `${xPx}px`; blip.style.top = `${yPx}px`;
                sonarContainer.appendChild(blip);
            }

            let angleDiff = Math.abs(monsterBearing - deviceHeading);
            if (angleDiff > 180) angleDiff = 360 - angleDiff;

            // Monster Muncul di Kamera AR jika jarak <= 6m & masuk sudut kerucut 60 derajat
            if (d <= 6 && angleDiff <= 30) {
                const imgM = document.getElementById("monster-ar");
                imgM.src = activeMonster.gambar;
                imgM.style.display = "block";
                document.getElementById("petunjuk-text").innerText = "🎯 TARGET TERKUNCI! Ketuk monster untuk bertarung!";
                document.getElementById("petunjuk-text").style.color = "#00ffbb";
            } else if (d <= 6) {
                document.getElementById("monster-ar").style.display = "none";
                document.getElementById("petunjuk-text").innerText = "⚠️ Monster dekat! Putar HP kamu untuk mengarahkan kamera!";
                document.getElementById("petunjuk-text").style.color = "#f59e0b";
            } else {
                document.getElementById("monster-ar").style.display = "none";
                document.getElementById("petunjuk-text").innerText = "Arahkan HP dan berjalanlah mendekati titik merah pada radar sonar.";
                document.getElementById("petunjuk-text").style.color = "#a0aec0";
            }
        }

        function picuPertarungan() {
            document.getElementById("battle-monster-name").innerText = activeMonster.nama;
            document.getElementById("soal-text").innerText = activeMonster.soal;
            
            // Tampilkan Gambar Soal Jika Tersedia
            const imgSoalElem = document.getElementById("soal-image");
            if (activeMonster.gambarSoal && activeMonster.gambarSoal.trim() !== "") {
                imgSoalElem.src = activeMonster.gambarSoal;
                imgSoalElem.style.display = "block";
            } else {
                imgSoalElem.style.display = "none";
            }

            document.getElementById("jawaban-input").value = "";
            document.getElementById("battle-screen").style.display = "flex";
        }

        function abaikanMonster() {
            document.getElementById("battle-screen").style.display = "none";
        }

        async function serangMonster() {
            const jawabUser = parseFloat(document.getElementById("jawaban-input").value);
            if (isNaN(jawabUser)) return alert("Masukkan jawaban angka!");

            if (Math.abs(jawabUser - activeMonster.jawab) < 0.01) {
                alert(`💥 DAR! ${activeMonster.nama} hancur. +100 Poin!`);
                
                totalPoin += 100; totalTargetSelesai += 1;
                document.getElementById("poin-val").innerText = totalPoin;
                document.getElementById("battle-screen").style.display = "none";
                document.getElementById("monster-ar").style.display = "none";

                try {
                    await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "update_skor", nama: namaSiswa, poin: totalPoin })
                    });
                } catch (e) { console.error(e); }

                munculkanMonsterBerikutnya();
            } else {
                alert("🛡️ Meleset! Jawabanmu salah, hitung kembali dengan cermat.");
            }
        }

        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180; const phi2 = lat2 * Math.PI/180;
            const dPhi = (lat2-lat1) * Math.PI/180; const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        window.onload = startUpGame;
    </script>
</body>
</html>
