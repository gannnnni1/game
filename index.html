<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AR Target Hunter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: black; color: white;
            text-align: center; overflow: hidden;
        }
        #webcam {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 5; box-sizing: border-box; padding: 15px; pointer-events: none;
        }
        .ui-element { pointer-events: auto; }

        h1 { color: #ed8936; font-size: 20px; margin: 5px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .stats-box {
            display: flex; justify-content: space-around;
            background: rgba(26, 32, 44, 0.85);
            padding: 8px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #4a5568;
        }

        /* RADAR SONAR DENGAN MATA ANGIN */
        .sonar-container {
            background: rgba(10, 25, 20, 0.9);
            padding: 12px; border-radius: 16px; 
            border: 2px solid #00ff66; margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center;
        }

        .sonar-screen {
            position: relative; width: 160px; height: 160px;
            border-radius: 50%; border: 2px solid #00ff66;
            background: radial-gradient(circle, rgba(0,255,102,0.15) 0%, rgba(0,0,0,0.8) 80%);
            overflow: hidden; margin: 8px 0;
        }

        /* LAYER MATA ANGIN YANG BERPUTAR DENGAN KOMPAS */
        .compass-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; pointer-events: none; z-index: 2;
            transition: transform 0.1s linear;
        }

        .compass-cardinal {
            position: absolute; font-weight: 900; font-size: 13px;
            text-shadow: 0 0 4px rgba(0,0,0,0.9); transform: translate(-50%, -50%);
        }
        .cardinal-n { top: 10px; left: 50%; color: #00ff66; font-size: 15px; } /* Utara - Hijau */
        .cardinal-e { top: 50%; left: 150px; color: #38bdf8; } /* Timur */
        .cardinal-s { top: 150px; left: 50%; color: #f43f5e; } /* Selatan */
        .cardinal-w { top: 50%; left: 10px; color: #fbbf24; } /* Barat */

        .sonar-sweep {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: conic-gradient(from 0deg, rgba(0,255,102,0.3) 0deg, transparent 90deg);
            border-radius: 50%; animation: sweep-rotation 4s linear infinite; pointer-events: none;
        }
        @keyframes sweep-rotation {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }

        .sonar-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px dashed rgba(0, 255, 102, 0.3); border-radius: 50%; pointer-events: none;
        }
        .ring-1 { width: 50px; height: 50px; }
        .ring-2 { width: 100px; height: 100px; }

        .sonar-blip {
            position: absolute; width: 12px; height: 12px;
            background-color: #ff3333; border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 10px #ff3333; z-index: 3;
            animation: blip-blink 1.2s infinite;
        }
        @keyframes blip-blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .player-blip {
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
            background-color: #00ffbb; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ffbb; z-index: 4;
        }

        #monster-ar {
            display: none; position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%); width: 180px; height: 180px; object-fit: contain;
            z-index: 2; cursor: pointer; filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.8));
            animation: float 1.2s ease-in-out infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-50%, -50%) translateY(0px) scale(1); }
            to { transform: translate(-50%, -50%) translateY(-20px) scale(1.05); }
        }

        /* OVERLAY START & BATTLE */
        .overlay-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .box-card {
            background: #1e293b; padding: 25px; border-radius: 16px; width: 85%; max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7); border: 2px solid #3b82f6; text-align: center;
        }

        input {
            width: 80%; padding: 12px; font-size: 16px; margin: 10px 0;
            background: #0f172a; color: white; border: 2px solid #475569; border-radius: 8px; text-align: center;
        }
        button {
            background: #3b82f6; color: white; border: none; padding: 12px 20px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
            text-transform: uppercase; width: 100%; margin-top: 10px;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <img id="monster-ar" onclick="picuPertarungan()" src="" alt="Monster AR">

    <!-- OVERLAY START -->
    <div class="overlay-screen" id="start-screen">
        <div class="box-card">
            <h2 style="color: #3b82f6; margin-top: 0;">🎮 AR Target Hunter</h2>
            <p style="font-size: 14px; color: #cbd5e1;">Masukkan nama untuk memulai perburuan monster math!</p>
            <input type="text" id="input-nama" placeholder="Nama Lengkap Pemain..."><br>
            <button onclick="mulaiGame()">🚀 MULAI PETUALANGAN</button>
        </div>
    </div>

    <!-- UI LAYER GAME -->
    <div class="ui-layer">
        <div class="ui-element">
            <h1>🎯 Math AR Target Hunter</h1>
            <div class="stats-box">
                <div>Pemain: <span id="nama-val" style="color: #60a5fa;">...</span></div>
                <div>Poin: <span id="poin-val" style="color: #4ade80;">0</span></div>
                <div>Target: <span id="target-count" style="color: #fb923c;">0/0</span></div>
            </div>
        </div>

        <div class="ui-element sonar-container">
            <div style="font-weight: bold; color: #00ff66; font-size: 13px; letter-spacing: 1px;">📡 AR SCANNER RADAR (KOMPAS)</div>
            
            <div class="sonar-screen">
                <!-- RING MATA ANGIN (N, E, S, W) -->
                <div class="compass-ring" id="compass-ring">
                    <span class="compass-cardinal cardinal-n">U</span> <!-- Utara -->
                    <span class="compass-cardinal cardinal-e">T</span> <!-- Timur -->
                    <span class="compass-cardinal cardinal-s">S</span> <!-- Selatan -->
                    <span class="compass-cardinal cardinal-w">B</span> <!-- Barat -->
                </div>

                <div class="sonar-sweep"></div>
                <div class="sonar-ring ring-1"></div>
                <div class="sonar-ring ring-2"></div>
                <div class="player-blip"></div>
                <div id="sonar-monsters-container"></div>
            </div>

            <p id="jarak-text" style="font-size: 18px; font-weight: bold; color: #00ff66; margin: 2px 0;">Menghubungkan Sensor...</p>
            <p id="petunjuk-text" style="font-size: 11px; color: #a0aec0; margin: 0; text-align: center;">Arahkan HP sesuai mata angin dan berjalanlah mendekat.</p>
        </div>
    </div>

    <!-- POP-UP BATTLE -->
    <div class="overlay-screen" id="battle-screen" style="display: none;">
        <div class="box-card" style="border-color: #ef4444;">
            <h2 id="battle-monster-name" style="color: #ef4444; margin-top: 0;">Monster</h2>
            <p id="soal-text" style="font-size: 16px; background: #0f172a; padding: 12px; border-radius: 8px; font-weight: bold; text-align: left; border-left: 5px solid #ef4444; margin-bottom: 10px;"></p>
            
            <img id="soal-image" src="" alt="Gambar Soal" style="width:100%; max-height:180px; object-fit:contain; display:none; margin-bottom:10px;">

            <input type="number" id="jawaban-input" placeholder="Jawaban angka..." step="any"><br>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="serangMonster()" style="background: #ef4444;">⚔️ SERANG</button>
                <button onclick="abaikanMonster()" style="background: #64748b;">🏃 ABAIKAN</button>
            </div>
        </div>
    </div>

    <script>
             const API_URL = "https://script.google.com/macros/s/AKfycbwv4xFqOaxWwI1YWqXQazS_PsIqbGA0bcmiJTHoChxzO7SuzMBbGPoFABbqwrhSf60CIw/exec"; 
     const DEFAULT_MONSTER_IMG = "https://cdn-icons-png.flaticon.com/512/2589/2589301.png";
        const MAX_MONSTER_DISTANCE = 10.0;

        const FALLBACK_DATABASE = {
            "M1": { nama: "Slime Math", soal: "Berapakah hasil dari 12 + 15?", jawab: 27, gambar: DEFAULT_MONSTER_IMG },
            "M2": { nama: "Goblin Angka", soal: "Berapakah 8 x 7?", jawab: 56, gambar: DEFAULT_MONSTER_IMG },
            "M3": { nama: "Naga Aljabar", soal: "Jika 2x = 10, berapakah x?", jawab: 5, gambar: DEFAULT_MONSTER_IMG }
        };

        let namaSiswa = "";
        let antreanMonster = [], activeMonster = null;
        let totalPoin = 0, totalTargetSelesai = 0, totalMonsterAwal = 0;
        let deviceHeading = 0;
        let isDataLoaded = false;
        let isFirstSpawn = true;

        let playerX = 0, playerY = 0; 
        let lastAccelZ = 0;

        async function mulaiGame() {
            const inputField = document.getElementById("input-nama");
            if (!inputField.value.trim()) return alert("Masukkan namamu terlebih dahulu!");
            
            namaSiswa = inputField.value.trim();
            document.getElementById("nama-val").innerText = namaSiswa;
            document.getElementById("start-screen").style.display = "none";

            await mintaIzinSensorDanKamera();
            muatSoalCloud();
            setInterval(updateRenderRadar, 100);
        }

        async function mintaIzinSensorDanKamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById("webcam").srcObject = stream;
            } catch (e) { alert("Kamera tidak dapat diakses!"); }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') window.addEventListener('deviceorientation', tanganiOrientasi, true);
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', tanganiOrientasi, true);
            }

            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', function(e) {
                    let acc = e.accelerationIncludingGravity;
                    if (!acc) return;
                    let deltaZ = Math.abs((acc.z || 0) - lastAccelZ);
                    if (deltaZ > 3.5) { 
                        let angleRad = deviceHeading * Math.PI / 180;
                        playerX += 0.6 * Math.sin(angleRad);
                        playerY += 0.6 * Math.cos(angleRad);
                    }
                    lastAccelZ = acc.z || 0;
                });
            }
        }

        function tanganiOrientasi(e) {
            if (e.webkitCompassHeading) deviceHeading = e.webkitCompassHeading;
            else if (e.alpha) deviceHeading = 360 - e.alpha;

            // PUTAR MATA ANGIN RADAR SESUAI ARAH HP
            const compassRing = document.getElementById("compass-ring");
            if (compassRing) {
                compassRing.style.transform = `rotate(${-deviceHeading}deg)`;
            }
        }

        async function muatSoalCloud() {
            let databaseMonster = null;

            if (API_URL && API_URL.startsWith("http")) {
                try {
                    let res = await fetch(API_URL);
                    databaseMonster = await res.json();
                } catch (err) {
                    databaseMonster = FALLBACK_DATABASE;
                }
            } else {
                databaseMonster = FALLBACK_DATABASE;
            }

            let keys = Object.keys(databaseMonster);
            totalMonsterAwal = keys.length;

            antreanMonster = keys.map(id => ({
                id: id,
                nama: databaseMonster[id].nama,
                gambar: databaseMonster[id].gambar || DEFAULT_MONSTER_IMG,
                soal: databaseMonster[id].soal,
                gambarSoal: databaseMonster[id].gambarSoal || "",
                jawab: databaseMonster[id].jawab
            }));

            isDataLoaded = true;
            spawnNextMonster();
        }

        // MONSTER TERKUNCI MATI (STATIONARY ANCHOR)
        function spawnNextMonster() {
            if (antreanMonster.length === 0) {
                activeMonster = null;
                document.getElementById("target-count").innerText = `${totalTargetSelesai}/${totalMonsterAwal}`;
                return;
            }

            let nextData = antreanMonster.shift();
            let headingRad = deviceHeading * Math.PI / 180;
            let mX = 0, mY = 0;

            if (isFirstSpawn) {
                // SPAWN PERTAMA: Selalu tepat 1.5 meter DI DEPAN HP pemain saat ini
                mX = playerX + 1.5 * Math.sin(headingRad);
                mY = playerY + 1.5 * Math.cos(headingRad);
                isFirstSpawn = false;
            } else {
                // SPAWN BERIKUTNYA: Posisi acak 3 - 5 meter dari pemain, LALU DIAM TERTANAM DI SANA
                let jarakMeter = 3 + Math.random() * 2; 
                let sudut = Math.random() * 2 * Math.PI;
                mX = playerX + jarakMeter * Math.sin(sudut);
                mY = playerY + jarakMeter * Math.cos(sudut);
            }

            // Koor posX dan posY ini TIDAK AKAN PERNAH BERUBAH LAGI (Monstermu diam di tempat!)
            activeMonster = { ...nextData, posX: mX, posY: mY };
            document.getElementById("target-count").innerText = `${totalTargetSelesai}/${totalMonsterAwal}`;
        }

        function updateRenderRadar() {
            if (!isDataLoaded) {
                document.getElementById("jarak-text").innerText = "Memuat Game...";
                return;
            }

            const sonarContainer = document.getElementById("sonar-monsters-container");
            sonarContainer.innerHTML = "";

            if (!activeMonster) {
                document.getElementById("jarak-text").innerText = "SEMUA TARGET DITAKLUKKAN!";
                document.getElementById("petunjuk-text").innerText = "Luar biasa! Seluruh monster telah dikalahkan.";
                document.getElementById("monster-ar").style.display = "none";
                return;
            }

            // HITUNG MURNI PERPINDAHAN PEMAIN MENDEKATI MONSTER DIAM
            let dx = activeMonster.posX - playerX;
            let dy = activeMonster.posY - playerY;
            let d = Math.sqrt(dx * dx + dy * dy);

            document.getElementById("jarak-text").innerText = `${d.toFixed(1)} Meter`;

            let monsterBearing = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
            const RADAR_MAX_JARAK = 10, RADAR_RADIUS_PX = 80; 

            // RENDER TITIK MERAH MONSTER DI RADAR
            if (d <= RADAR_MAX_JARAK) {
                let ratio = d / RADAR_MAX_JARAK;
                let distPx = ratio * RADAR_RADIUS_PX;

                let radarAngleRad = (monsterBearing - deviceHeading - 90) * Math.PI / 180;
                let xPx = RADAR_RADIUS_PX + distPx * Math.cos(radarAngleRad);
                let yPx = RADAR_RADIUS_PX - distPx * Math.sin(radarAngleRad);

                let blip = document.createElement("div");
                blip.className = "sonar-blip";
                blip.style.left = `${xPx}px`; blip.style.top = `${yPx}px`;
                sonarContainer.appendChild(blip);
            }

            let angleDiff = Math.abs(monsterBearing - deviceHeading);
            if (angleDiff > 180) angleDiff = 360 - angleDiff;

            // DISPLAY MONSTER AR
            if (d <= 2.5 && angleDiff <= 35) {
                const imgM = document.getElementById("monster-ar");
                imgM.src = activeMonster.gambar;
                imgM.style.display = "block";
                document.getElementById("petunjuk-text").innerText = "🎯 TARGET TERKUNCI! Ketuk monster untuk bertarung!";
                document.getElementById("petunjuk-text").style.color = "#00ffbb";
            } else if (d <= 2.5) {
                document.getElementById("monster-ar").style.display = "none";
                document.getElementById("petunjuk-text").innerText = "⚠️ Monster sangat dekat! Putar HP ke arah titik merah!";
                document.getElementById("petunjuk-text").style.color = "#f59e0b";
            } else {
                document.getElementById("monster-ar").style.display = "none";
                document.getElementById("petunjuk-text").innerText = "Arahkan HP dan berjalanlah mendekati titik merah pada radar.";
                document.getElementById("petunjuk-text").style.color = "#a0aec0";
            }
        }

        function picuPertarungan() {
            document.getElementById("battle-monster-name").innerText = activeMonster.nama;
            document.getElementById("soal-text").innerText = activeMonster.soal;
            
            const imgSoalElem = document.getElementById("soal-image");
            if (activeMonster.gambarSoal && activeMonster.gambarSoal.trim() !== "") {
                imgSoalElem.src = activeMonster.gambarSoal;
                imgSoalElem.style.display = "block";
            } else {
                imgSoalElem.style.display = "none";
            }

            document.getElementById("jawaban-input").value = "";
            document.getElementById("battle-screen").style.display = "flex";
        }

        function abaikanMonster() {
            document.getElementById("battle-screen").style.display = "none";
            document.getElementById("monster-ar").style.display = "none";
            alert(`🏃 Kamu mengabaikan ${activeMonster.nama}. Mencari sasaran baru...`);
            spawnNextMonster();
        }

        async function serangMonster() {
            const jawabUser = parseFloat(document.getElementById("jawaban-input").value);
            if (isNaN(jawabUser)) return alert("Masukkan jawaban angka!");

            if (Math.abs(jawabUser - activeMonster.jawab) < 0.01) {
                alert(`💥 DAR! ${activeMonster.nama} hancur. +100 Poin!`);
                totalPoin += 100; 
                totalTargetSelesai += 1;
                document.getElementById("poin-val").innerText = totalPoin;
                document.getElementById("battle-screen").style.display = "none";
                document.getElementById("monster-ar").style.display = "none";

                if (API_URL && API_URL.startsWith("http")) {
                    try {
                        await fetch(API_URL, {
                            method: "POST",
                            body: JSON.stringify({ action: "update_skor", nama: namaSiswa, poin: totalPoin })
                        });
                    } catch (e) { console.error(e); }
                }

                spawnNextMonster();
            } else {
                alert("🛡️ Meleset! Jawabanmu salah, hitung kembali dengan cermat.");
            }
        }
    </script>
</body>
</html>
