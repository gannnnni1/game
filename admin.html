<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Math AR Monster</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a202c; color: white; padding: 20px; }
        .box { max-width: 600px; margin: 0 auto; background: #2d3748; padding: 20px; border-radius: 12px; }
        input, textarea { width: 95%; padding: 10px; margin: 8px 0; background: #1a202c; color: white; border: 1px solid #4a5568; border-radius: 6px; }
        button { background: #3182ce; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2b6cb0; }
        .danger { background: #e53e3e; }
        .danger:hover { background: #c53030; }
    </style>
</head>
<body>
    <div class="box">
        <h2>⚙️ Admin Panel - Kelola Monster AR</h2>
        <form id="form-monster">
            <label>ID Monster (cth: monster1)</label>
            <input type="text" id="id" required>
            
            <label>Nama Monster</label>
            <input type="text" id="nama" required>
            
            <label>URL Gambar Monster (PNG Transparan)</label>
            <input type="url" id="gambar" placeholder="https://domain.com/monster.png" required>
            
            <label>Soal Matematika (HOTS)</label>
            <textarea id="soal" rows="3" required></textarea>
            
            <label>Kunci Jawaban (Angka)</label>
            <input type="number" id="jawab" step="any" required>
            
            <button type="submit">💾 Simpan / Update Monster</button>
            <button type="button" class="danger" onclick="hapusMonster()">🗑️ Hapus Monster</button>
        </form>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdyX_HvzPNCgWJ05yR5MyAVIFwwp75gDQVaSQTefK1Hxtqr8R72huDEMLyAwC3cbO4/exec"; // Ganti dengan URL Apps Script-mu

        document.getElementById("form-monster").addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = {
                action: "save",
                id: document.getElementById("id").value,
                nama: document.getElementById("nama").value,
                gambar: document.getElementById("gambar").value,
                soal: document.getElementById("soal").value,
                jawab: parseFloat(document.getElementById("jawab").value)
            };
            await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
            alert("Data Monster Berhasil Disimpan!");
            e.target.reset();
        });

        async function hapusMonster() {
            const id = document.getElementById("id").value;
            if (!id) return alert("Masukkan ID Monster yang ingin dihapus!");
            if (confirm(`Hapus ${id}?`)) {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
                alert("Monster Berhasil Dihapus!");
                document.getElementById("form-monster").reset();
            }
        }
    </script>
</body>
</html>
