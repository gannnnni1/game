<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Live - Math AR</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 16px; border: 2px solid #38bdf8; }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        .item { display: flex; justify-content: space-between; background: #334155; margin: 8px 0; padding: 12px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .rank { color: #f59e0b; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🏆 LEADERBOARD LIVE</h1>
        <div id="list-skor">Memuat peringkat...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwv4xFqOaxWwI1YWqXQazS_PsIqbGA0bcmiJTHoChxzO7SuzMBbGPoFABbqwrhSf60CIw/exec"; 

        async function updateLeaderboard() {
            try {
                let res = await fetch(API_URL + "?type=leaderboard");
                let data = await res.json();
                let html = "";
                data.forEach((s, idx) => {
                    let mahkota = idx === 0 ? "🥇 " : idx === 1 ? "🥈 " : idx === 2 ? "🥉 " : "";
                    html += `<div class="item">
                        <div><span class="rank">${mahkota}#${idx+1}</span> ${s.nama}</div>
                        <div style="color: #4ade80;">${s.poin} Pts</div>
                    </div>`;
                });
                document.getElementById("list-skor").innerHTML = html || "Belum ada skor tercatat.";
            } catch (e) { console.error(e); }
        }

        setInterval(updateLeaderboard, 3000); // Auto update tiap 3 detik
        window.onload = updateLeaderboard;
    </script>
</body>
</html>
